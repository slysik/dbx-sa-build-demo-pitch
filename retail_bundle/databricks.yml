    default: interview
  schema:
    default: retail
  warehouse_id:
    default: b89b264d78f9d52e

include:
  - resources/*.yml

workspace:
  host: https://adb-7405619449104571.11.azuredatabricks.net

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/slysik@gmail.com/.bundle/${bundle.name}
