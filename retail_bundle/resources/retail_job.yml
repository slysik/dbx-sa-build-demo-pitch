# SA: Orchestration job — 3-task DAG: Bronze → SDP → Validate.
#     Serverless compute for notebook task (no cluster config = serverless).
#     Pipeline task triggers the SDP pipeline and waits for completion.
#     Validation notebook proves row counts across all 3 layers.
#     In production: add schedule, notifications, retry policy.

resources:
  jobs:
    retail_orchestrator:
      name: "[${bundle.target}] Retail Orchestrator"

      tasks:
        # Task 1: Generate Bronze data (serverless notebook)
        # SA: No cluster config = serverless compute. Spins up in seconds.
        - task_key: generate_bronze
          notebook_task:
            notebook_path: ../src/01_bronze_data_gen.py
            source: WORKSPACE

        # Task 2: Run SDP pipeline (Silver + Gold materialized views)
        # SA: pipeline_task triggers the SDP pipeline created by this bundle.
        #     full_refresh=true ensures materialized views recompute from scratch.
        - task_key: run_sdp_pipeline
          depends_on:
            - task_key: generate_bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.retail_medallion.id}
            full_refresh: true

        # Task 3: Cross-layer validation (serverless notebook)
        # SA: Proves data flows correctly Bronze → Silver → Gold.
        #     Row counts decrease slightly (Silver drops dupes + outliers).
        - task_key: validate_layers
          depends_on:
            - task_key: run_sdp_pipeline
          notebook_task:
            notebook_path: ../src/04_validate.py
            source: WORKSPACE
